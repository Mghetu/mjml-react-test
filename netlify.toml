[build]
  command = "npm run build"
  publish = "dist"
  functions = "netlify/functions"

[[headers]]
  for = "/*"
  [headers.values]
    X-Robots-Tag = "noindex, nofollow, noarchive, nosnippet"

[[redirects]]
  from = "/api/convert-mjml"
  to = "/.netlify/functions/convert-mjml"
  status = 200
  force = true

[[redirects]]
  from = "/api/auth/login"
  to = "/.netlify/functions/auth-login"
  status = 200
  force = true

[[redirects]]
  from = "/api/auth/session"
  to = "/.netlify/functions/auth-session"
  status = 200
  force = true

[[redirects]]
  from = "/api/auth/logout"
  to = "/.netlify/functions/auth-logout"
  status = 200
  force = true

[[redirects]]
  from = "/api/templates"
  to = "/.netlify/functions/templates-list"
  status = 200
  force = true

[[redirects]]
  from = "/api/templates/upsert"
  to = "/.netlify/functions/templates-upsert"
  status = 200
  force = true

[[redirects]]
  from = "/api/templates/delete"
  to = "/.netlify/functions/templates-delete"
  status = 200
  force = true

[[redirects]]
  from = "/api/templates/:id"
  to = "/.netlify/functions/templates-get/:id"
  status = 200
  force = true
